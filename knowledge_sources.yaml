## LifeFlow.ai Knowledge Sources
## Strategy: Depth > Breadth. Authority-dense PDFs first, HTML pages second.
## PDF chunks: 1500/250. HTML chunks: 1000/200. Authority weights applied per source.
## Phase A MVP: 8 domains. Phase B/C: welfare/legal (future).

domains:

  # ═══════════════════════════════════════════════════════
  # DOMAIN 1: Identity Documents
  # PDFs: Aadhaar Regulations (amendment), Passport handbook
  # HTML: UIDAI update pages, Passport FAQ, ECI, Parivahan
  # ═══════════════════════════════════════════════════════
  - name: "Identity Documents"
    sources:
      - authority: "UIDAI"
        documents:
          - title: "Aadhaar Enrolment and Update Regulations 2016 (Amendment 2024)"
            url: "https://uidai.gov.in/images/resource/UIDAI_Aadhaar_Enrolment_Update_Regulation_2016_amended_upto_25_Jan_2024.pdf"
            type: "pdf"
            doc_type: "regulation"
          - title: "Update Aadhaar Details (Online and Offline)"
            url: "https://uidai.gov.in/en/my-aadhaar/update-aadhaar.html"
            type: "html"
          - title: "Virtual ID and Aadhaar Authentication Overview"
            url: "https://uidai.gov.in/en/my-aadhaar/virtual-id-overview.html"
            type: "html"
          - title: "Aadhaar FAQ - Grievances and Support"
            url: "https://uidai.gov.in/en/contact-support/have-any-question.html"
            type: "html"

      - authority: "Passport Seva"
        documents:
          - title: "Passport Application FAQs"
            url: "https://www.passportindia.gov.in/AppOnlineProject/online/faqMainPage"
            type: "html"
          - title: "Tatkal Passport Scheme"
            url: "https://www.passportindia.gov.in/AppOnlineProject/online/tatkalScheme"
            type: "html"
          - title: "Passport Reissue and Renewal"

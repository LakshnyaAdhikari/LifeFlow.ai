## LifeFlow.ai Knowledge Sources
## Strategy: Depth > Breadth. Authority-dense PDFs first, HTML pages second.
## PDF chunks: 1500/250. HTML chunks: 1000/200. Authority weights applied per source.
## PDFs downloaded by scripts/download_pdfs.py → ingested from manifest.json
## DO NOT add direct PDF URLs here — remote PDFs fail with 403 (Akamai WAF)
## Phase A MVP: 8 domains

domains:

  # ═══════════════════════════════════════════════════════

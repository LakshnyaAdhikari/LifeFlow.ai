          - title: "PAN Services Guide"
            url: "https://incometaxindia.gov.in/Pages/pan.aspx"
            type: "html"
          - title: "How to Link Aadhaar with PAN"
            url: "https://www.incometax.gov.in/iec/foportal/help/how-to-link-aadhaar"
            type: "html"

      - authority: "Election Commission of India"
        documents:
          - title: "Voter ID - National Voters Service Portal"
            url: "https://voters.eci.gov.in/"
            type: "html"

      - authority: "Parivahan"
        documents:
          - title: "Driving Licence - All Services"
            url: "https://parivahan.gov.in/parivahan/en/content/driving-licence-dl"
